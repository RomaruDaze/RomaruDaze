name: Isometric Calendar Metrics
on:
  # Schedule updates every 12 hours
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below allow manual execution and run on main branch changes
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your secret token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          filename: github-metrics-isocalendar.svg
          base: "" # Strips away the general headers so ONLY the calendar is drawn
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year # Options: 'half-year' or 'full-year'
